<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Film reel icon -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="24"/>
  <circle cx="256" cy="256" r="50" fill="white"/>
  
  <!-- Film holes -->
  <circle cx="150" cy="180" r="18" fill="white"/>
  <circle cx="362" cy="180" r="18" fill="white"/>
  <circle cx="150" cy="332" r="18" fill="white"/>
  <circle cx="362" cy="332" r="18" fill="white"/>
  
  <!-- Play symbol -->
  <polygon points="220,200 220,312 310,256" fill="white"/>
</svg>