<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Burme Transcript</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease forwards;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo .logo-icon {
            font-size: 64px;
            display: block;
            animation: float 3s ease-in-out infinite;
            margin-bottom: 16px;
        }
        .auth-logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-form {
            display: block;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 28px;
            animation: fadeInUp 0.4s ease forwards;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        .auth-message {
            padding: 14px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .auth-message.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        .auth-message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .auth-message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .back-home {
            text-align: center;
            margin-top: 24px;
        }
        .back-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }
        .back-home a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="auth-container glass-card">
        <div class="auth-logo">
            <span class="logo-icon"><i class="bi bi-film"></i></span>
            <h1>Burme Transcript</h1>
        </div>

        <form id="forgot-form" class="auth-form">
            <div id="forgot-message" class="auth-message"></div>
            
            <p style="margin-bottom: 20px; color: var(--text-secondary);">
                <i class="bi bi-info-circle"></i> Enter your email and we'll send you a link to reset your password.
            </p>

            <div class="form-group">
                <label for="forgot-email"><i class="bi bi-envelope"></i> Email</label>
                <input type="email" id="forgot-email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn-auth" id="forgot-btn"><i class="bi bi-send"></i> Send Reset Link</button>

            <div class="auth-link">
                Remember your password? <a href="login.html">Login here</a>
            </div>
        </form>

        <div class="back-home">
            <a href="dashboard.html"><i class="bi bi-house"></i> Back to Dashboard</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcw0_7Pc4tIAapg-Hyvk4UtiQfo1USjU8",
            authDomain: "amk-apk.firebaseapp.com",
            databaseURL: "https://amk-apk-default-rtdb.firebaseio.com",
            projectId: "amk-apk",
            storageBucket: "amk-apk.firebasestorage.app",
            messagingSenderId: "267632318274",
            appId: "1:267632318274:android:441e4b8cb66da60d04dadb"
        };
        window.firebaseConfig = firebaseConfig;

        function showMessage(message, isSuccess) {
            const msgEl = document.getElementById('forgot-message');
            msgEl.textContent = message;
            msgEl.className = `auth-message show ${isSuccess ? 'success' : 'error'}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            FirebaseAuth.initFirebase();
        });

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgot-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Sending...';

            const email = document.getElementById('forgot-email').value;

            const result = await FirebaseAuth.resetPassword(email);
            
            if (result.success) {
                showMessage('Password reset link sent! Check your email.', true);
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-check-circle"></i> Sent';
            } else {
                showMessage(result.error, false);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send"></i> Send Reset Link';
            }
        });
    </script>
</body>
</html>
