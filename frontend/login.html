<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Burme Transcript</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-primary);
            padding: 20px;
        }

        .auth-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo span {
            font-size: 48px;
        }

        .auth-logo h1 {
            font-size: 24px;
            margin-top: 10px;
            color: var(--text-primary);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            transition: border-color var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-google {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .btn-google:hover {
            background: #f5f5f5;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .auth-divider {
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .auth-message {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .auth-message.show {
            display: block;
        }

        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 40px;
        }

        .toggle-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .loading::after {
            content: '...';
            animation: dots 1s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <span>🎬</span>
                <h1>Burme Transcript</h1>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div id="login-message" class="auth-message"></div>
                
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <span class="toggle-icon" onclick="togglePassword('login-password')">👁</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-auth" id="login-btn">Login</button>

                <div class="auth-link">
                    <a href="#" id="forgot-password-link">Forgot Password?</a>
                </div>

                <div class="auth-divider">or</div>

                <button type="button" class="btn-auth btn-google" onclick="loginWithGoogle()">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continue with Google
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div id="register-message" class="auth-message"></div>
                
                <div class="form-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="register-password" placeholder="Create a password" required minlength="6">
                        <span class="toggle-icon" onclick="togglePassword('register-password')">👁</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <div class="password-toggle">
                        <input type="password" id="register-confirm" placeholder="Confirm your password" required>
                        <span class="toggle-icon" onclick="togglePassword('register-confirm')">👁</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-auth" id="register-btn">Create Account</button>

                <div class="auth-divider">or</div>

                <button type="button" class="btn-auth btn-google" onclick="loginWithGoogle()">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Continue with Google
                </button>
            </form>

            <!-- Reset Password Form -->
            <form id="reset-form" class="auth-form">
                <div id="reset-message" class="auth-message"></div>
                
                <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">
                    Enter your email and we'll send you a link to reset your password.
                </p>

                <div class="form-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn-primary btn-auth" id="reset-btn">Send Reset Link</button>

                <div class="auth-link">
                    <a href="#" onclick="showTab('login')">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCcw0_7Pc4tIAapg-Hyvk4UtiQfo1USjU8",
            authDomain: "amk-apk.firebaseapp.com",
            databaseURL: "https://amk-apk-default-rtdb.firebaseio.com",
            projectId: "amk-apk",
            storageBucket: "amk-apk.firebasestorage.app",
            messagingSenderId: "267632318274",
            appId: "1:267632318274:android:441e4b8cb66da60d04dadb",
            measurementId: "G-E2658JJ29R"
        };

        // Make config available globally
        window.firebaseConfig = firebaseConfig;

        // Initialize Firebase
        FirebaseAuth.initFirebase();

        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-form`).classList.add('active');
            
            // Hide messages
            document.querySelectorAll('.auth-message').forEach(m => {
                m.classList.remove('show', 'success', 'error');
            });
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => showTab(tab.dataset.tab));
        });

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Show message
        function showMessage(formId, message, isSuccess) {
            const msgEl = document.getElementById(`${formId}-message`);
            msgEl.textContent = message;
            msgEl.className = `auth-message show ${isSuccess ? 'success' : 'error'}`;
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const result = await FirebaseAuth.login(email, password);
            
            if (result.success) {
                showMessage('login', 'Login successful! Redirecting...', true);
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showMessage('login', result.error, false);
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (password !== confirm) {
                showMessage('register', 'Passwords do not match', false);
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            const result = await FirebaseAuth.register(email, password, name);
            
            if (result.success) {
                showMessage('register', 'Account created! Redirecting...', true);
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showMessage('register', result.error, false);
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        });

        // Login with Google
        async function loginWithGoogle() {
            const result = await FirebaseAuth.loginWithGoogle();
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                showMessage('login', result.error, false);
            }
        }

        // Forgot Password
        document.getElementById('forgot-password-link').addEventListener('click', (e) => {
            e.preventDefault();
            showTab('reset');
        });

        // Reset Password
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            const email = document.getElementById('reset-email').value;

            const result = await FirebaseAuth.resetPassword(email);
            
            if (result.success) {
                showMessage('reset', 'Password reset link sent! Check your email.', true);
                setTimeout(() => showTab('login'), 3000);
            } else {
                showMessage('reset', result.error, false);
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        });

        // Check if already logged in
        FirebaseAuth.getCurrentUser().then(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>

    <script src="js/firebase-auth.js"></script>
</body>
</html>
